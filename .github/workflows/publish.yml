name: Publish to npm

# Publishes to npm whenever a version tag (e.g. v0.2.0) is pushed.
# Auth uses npm "trusted publishing" via OIDC — no NPM_TOKEN secret is stored.
# Requires a one-time trusted-publisher setup on npmjs.com for this repo.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify the tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      # `prepublishOnly` runs jest + tsc, and `prepare` runs the build, both via npm lifecycle.
      - name: Publish
        run: npm publish
